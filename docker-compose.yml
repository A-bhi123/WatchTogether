version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: watchtogether-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - watchtogether-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: watchtogether-backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/watchtogether
      - JWT_SECRET=${JWT_SECRET:-supersecretchangeme}
      - JWT_EXPIRES_IN=7d
      - CLIENT_URL=http://localhost:5173
      - NODE_ENV=production
      - MAX_FILE_SIZE=500mb
      - UPLOAD_DIR=uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      - mongodb
    networks:
      - watchtogether-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000
        - VITE_SOCKET_URL=http://localhost:5000
    container_name: watchtogether-frontend
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - watchtogether-network

volumes:
  mongo_data:
  uploads_data:

networks:
  watchtogether-network:
    driver: bridge
